{% extends 'base.html' %}

{% block title %}
    Delete: {{ object.title }}
{% endlbock %}


{% block content %}
<div>
    <div>
        <div>
            <h2>Delete Recipe</h2>
            <p>
                Are you sure you want to delete?<strong>{{ object.title }}</strong>
                This action cannot be undone!
            </p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn bt-danger me-2">Yes, delete it</button>
                <a href="{% url 'recipe_detail object.slug %}" class="btn btn-outline-secondary">Cancel</a>

            </form>
        </div>
    </div>
</div>
{% endblock %}
